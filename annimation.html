<html>
    <head>
    <title>Annimation</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            animation-name:example;
            animation-duration:4s ;
        }
        @keyframes example{
            0%{background-color: cornflowerblue;}
            25%{background-color: rgb(203, 134, 203);}
            50%{background-color: mediumpurple;}
            100%{background-color: deepskyblue;}
        }
    </style>
    </head>
    <body>
        <div>Hi!</div>
    </body>
</html>
