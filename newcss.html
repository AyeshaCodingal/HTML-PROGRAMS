<html>
    <head>
        <title>CSS Styling</title>
        <style>
            h2{
                color: brown;
                background-color: beige;

            }
            .p1{
                font-family: cursive;
                font-size: 30;
                font-weight: bold;
                background-color: cadetblue;
            }
        #home{
            font-family: monospace;
            font-style: italic;
            font-size: 25;

        }
        </style>
    </head>
    <body>
        <h1 style="background-color: aquamarine;">this is inline css where css code is written in html tag.</h1>
        <h2>This is Internal css here we have different style tags in head section</h2>
       
        <p class="p1">this is a paragraph tag for font changing</p>
        <p id="home">
        this is different paragraph.</p>
    </body>
        

    
    
</html>
