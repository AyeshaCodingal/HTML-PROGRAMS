<html>
    <head>
        <style>
            div{
                right: 30px;
                border: 3px solid blue;
                margin: 10px;
            }
            .absolute{
            position: absolute;
            }
            .fixed{
                position: fixed;
                top: 70px;
            }
            .relative{
                position: relative;
                left: 50px;
                top: 100px;
            }
            .static{
                position: static;
            }
        </style>
    </head>
    <body>
        <div>Div with no position</div>
        <div class="fixed">Div with fixed position</div>
        <div class="static">Div with static position</div>
        <div class="relative">Div with relative position</div>
        <div class="absolute">Div with absolute position</div>
